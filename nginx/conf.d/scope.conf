# Scope — scope.chainalert.dev
#
# Uses resolver + variables so nginx starts even if scope isn't deployed.

server {
    listen 443 ssl;
    server_name scope.chainalert.dev;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s;

    set $scope_api  scope-api:4200;
    set $scope_web  scope-web:80;

    # ── Backend API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://$scope_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Auth routes (Google OAuth, session exchange) ─────────────────
    location /auth/ {
        proxy_pass http://$scope_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ─────────────────────────────────────────────────
    location = /health {
        proxy_pass http://$scope_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Frontend SPA (nginx serving static Vite build) ───────────────
    location / {
        proxy_pass http://$scope_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── Limits ───────────────────────────────────────────────────────
    # Media uploads go directly to S3 via presigned URL, so nginx never
    # sees large bodies. API JSON limit in the backend is 1 MB.
    client_max_body_size 2m;
}
