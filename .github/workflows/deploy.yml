name: Deploy Gateway to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gateway-hetzner
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Gateway to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts
          echo "Host ${{ secrets.HETZNER_HOST }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/deploy_key" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Fetch TLS certs from SSM
        run: |
          aws ssm get-parameter \
            --name "/chainalert/production/CLOUDFLARE_ORIGIN_CERT" \
            --with-decryption --query "Parameter.Value" --output text > origin.pem

          aws ssm get-parameter \
            --name "/chainalert/production/CLOUDFLARE_ORIGIN_KEY" \
            --with-decryption --query "Parameter.Value" --output text > origin-key.pem

      - name: Deploy
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Transfer TLS certs
          ssh ${USER}@${HOST} "mkdir -p /opt/gateway/certs"
          scp origin.pem origin-key.pem ${USER}@${HOST}:/opt/gateway/certs/
          ssh ${USER}@${HOST} "chmod 600 /opt/gateway/certs/origin-key.pem"

          # Ensure repo exists (first deploy)
          ssh ${USER}@${HOST} "
            if [ ! -d /opt/gateway/repo/.git ]; then
              sudo mkdir -p /opt/gateway/repo && sudo chown -R deploy:deploy /opt/gateway
              git clone 'https://x-access-token:${GH_APP_TOKEN}@github.com/OpSecWeb3/gateway.git' /opt/gateway/repo
            fi
          "

          # Configure git auth temporarily for pull
          ssh ${USER}@${HOST} "
            cd /opt/gateway/repo
            git remote set-url origin 'https://x-access-token:${GH_APP_TOKEN}@github.com/OpSecWeb3/gateway.git'
          "

          # Run deploy script
          ssh ${USER}@${HOST} "cd /opt/gateway/repo && bash scripts/deploy.sh"

          # Clear token from remote URL
          ssh ${USER}@${HOST} "
            cd /opt/gateway/repo
            git remote set-url origin 'https://github.com/OpSecWeb3/gateway.git'
          "

      - name: Collect failure logs
        if: failure()
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh ${USER}@${HOST} "cd /opt/gateway && docker compose logs --tail=50 nginx" || true
