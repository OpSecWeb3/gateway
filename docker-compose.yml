# Shared Infra — nginx gateway + postgres + redis
#
# Single compose stack that provides:
#   • nginx (gateway) — TLS termination, reverse proxy to app stacks
#   • postgres — shared database server (multiple DBs, one per app)
#   • redis — shared queue/cache server
#
# Apps join the external networks to consume these services:
#   • gateway      — any app container that needs HTTPS routing via nginx
#   • shared-infra — any app container that needs postgres/redis access
#
# Usage:
#   docker compose up -d
#
# The deploy script creates both external networks idempotently. Drop new
# *.conf files into nginx/conf.d/ to add more services behind the gateway.

name: shared

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - gateway

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=768MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      shared-infra:
        aliases:
          - postgres
    # Not exposed to host — only reachable from shared-infra network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --appendfsync everysec
        --maxmemory 1152mb
        --maxmemory-policy noeviction
        --maxclients 500
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      shared-infra:
        aliases:
          - redis

volumes:
  pgdata:
  redisdata:

networks:
  gateway:
    external: true
  shared-infra:
    external: true
