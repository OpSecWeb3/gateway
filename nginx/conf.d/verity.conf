# Verity Core — verity.chainalert.dev
#
# Uses resolver + variables so nginx starts even if verity isn't deployed.

server {
    listen 443 ssl;
    server_name verity.chainalert.dev;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s;

    set $verity_api  verity-api:3700;
    set $verity_web  verity-web:3000;

    # ── Webhooks (Docker Hub) ────────────────────────────────────────
    location /webhooks/ {
        proxy_pass http://$verity_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── CI API (external callers with API keys) ──────────────────────
    location /api/ci/ {
        proxy_pass http://$verity_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ─────────────────────────────────────────────────
    location = /health {
        proxy_pass http://$verity_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Web (Next.js) — handles everything else including /api/proxy/* ──
    location / {
        proxy_pass http://$verity_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── Limits ───────────────────────────────────────────────────────
    client_max_body_size 2m;
}
