name: Deploy Gateway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-gateway
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Gateway to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy

      - name: Store GitHub App token in SSM
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          aws ssm put-parameter \
            --name "/chainalert/production/GH_APP_TOKEN" \
            --value "${GH_APP_TOKEN}" \
            --type SecureString \
            --overwrite > /dev/null
          echo "GitHub App token stored in SSM."

      - name: Deploy via SSM Send Command
        id: deploy
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          # Bootstrap script handles first deploy (repo not cloned yet)
          printf '%s\n' \
            '#!/bin/bash' \
            'set -euo pipefail' \
            'REPO_DIR="/opt/gateway/repo"' \
            'if [ -f "$REPO_DIR/scripts/deploy.sh" ]; then' \
            '  cd "$REPO_DIR" && bash scripts/deploy.sh' \
            'else' \
            '  echo "==> First deploy: bootstrapping..."' \
            '  TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60")' \
            '  REGION=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/region)' \
            '  GH_TOKEN=$(aws ssm get-parameter --name /chainalert/production/GH_APP_TOKEN --with-decryption --query Parameter.Value --output text --region "$REGION")' \
            '  mkdir -p /opt/gateway' \
            '  git clone "https://x-access-token:${GH_TOKEN}@github.com/OpSecWeb3/gateway.git" "$REPO_DIR"' \
            '  cd "$REPO_DIR" && bash scripts/deploy.sh' \
            'fi' \
            > /tmp/gateway-bootstrap.sh

          ENCODED=$(base64 -w0 /tmp/gateway-bootstrap.sh)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy gateway ${DEPLOY_SHA::7}" \
            --timeout-seconds 300 \
            --parameters "commands=[\"echo ${ENCODED} | base64 -d > /tmp/gw-deploy.sh && bash /tmp/gw-deploy.sh\"]" \
            --query "Command.CommandId" --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: ${COMMAND_ID}"

          # Poll for completion (up to 5 minutes)
          MAX_POLL=30
          for i in $(seq 1 $MAX_POLL); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi
            echo "  Waiting for SSM command... ($i/$MAX_POLL, status: $STATUS)"
            sleep 10
          done

          RESULT=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}")

          STATUS=$(echo "$RESULT" | jq -r '.Status')
          echo "$RESULT" | jq -r '.StandardOutputContent'

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Gateway deploy failed with status: ${STATUS}"
            echo "$RESULT" | jq -r '.StandardErrorContent'
            exit 1
          fi

      - name: Collect failure logs
        if: failure()
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Collect gateway failure logs" \
            --timeout-seconds 60 \
            --parameters 'commands=["cd /opt/gateway && docker compose logs --tail=50 nginx 2>&1 || echo No gateway containers found"]' \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" || true

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StandardOutputContent" --output text
