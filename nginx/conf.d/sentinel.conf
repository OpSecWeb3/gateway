# Sentinel — sentinel.chainalert.dev
#
# Uses resolver + variables so nginx starts even if sentinel isn't deployed.

server {
    listen 443 ssl;
    server_name sentinel.chainalert.dev;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s;

    set $sentinel_api  sentinel-api:4100;
    set $sentinel_web  sentinel-web:3100;

    # ── Backend API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://$sentinel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Auth routes ──────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://$sentinel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Integration callbacks (Slack OAuth, etc.) ────────────────────
    location /integrations/ {
        proxy_pass http://$sentinel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Module routes (webhooks, CI notify, module APIs) ─────────────
    location /modules/ {
        proxy_pass http://$sentinel_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Health check ─────────────────────────────────────────────────
    location = /health {
        proxy_pass http://$sentinel_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Web (Next.js) ────────────────────────────────────────────────
    location / {
        proxy_pass http://$sentinel_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── Limits ───────────────────────────────────────────────────────
    client_max_body_size 2m;
}
